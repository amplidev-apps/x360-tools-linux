name: Windows Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v2.0.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flutter Dependencies
        run: flutter pub get
        working-directory: x360_tools_flutter

      - name: Build Flutter Windows
        run: flutter build windows --release
        working-directory: x360_tools_flutter

      - name: Bundle Python Backend Assets
        shell: pwsh
        run: |
          $AssetDest = "x360_tools_flutter/build/windows/x64/runner/Release/data/flutter_assets/assets/python_backend"
          New-Item -ItemType Directory -Path $AssetDest -Force
          
          Write-Host "Copying core modules..."
          Copy-Item -Path "core" -Destination "$AssetDest/core" -Recurse -Force
          
          Write-Host "Copying service bridge..."
          Copy-Item -Path "service_bridge.py" -Destination "$AssetDest/service_bridge.py" -Force
          
          Write-Host "Copying database and templates..."
          if (Test-Path "titleIDs.db") { Copy-Item -Path "titleIDs.db" -Destination "$AssetDest/titleIDs.db" -Force }
          if (Test-Path "assets") { Copy-Item -Path "assets" -Destination "$AssetDest/assets" -Recurse -Force }
          
          Write-Host "Backend bundling complete."

      - name: Compile Inno Setup Installer
        run: |
          if (!(Test-Path "windows_port/installer_output")) { New-Item -ItemType Directory -Path "windows_port/installer_output" -Force }
          iscc windows_port/installer_config.iss
        shell: pwsh

      - name: Upload Artifact (Experimental)
        uses: actions/upload-artifact@v4
        with:
          name: x360Tools-Setup-Preview
          path: windows_port/installer_output/x360Tools_Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows_port/installer_output/x360Tools_Setup.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
