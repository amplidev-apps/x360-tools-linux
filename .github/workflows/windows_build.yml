name: Windows Release Build

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v2.1
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: x360_tools_flutter

      - name: Build Windows
        run: flutter build windows --release
        working-directory: x360_tools_flutter

      - name: Convert Icon to ICO
        run: magick assets\x360_tools_icon.png -define icon:auto-resize=256,128,64,48,32,16 assets\app_icon.ico
        working-directory: x360_tools_flutter

      - name: Compile Inno Setup Installer
        run: iscc windows_installer.iss
        shell: cmd
        working-directory: x360_tools_flutter

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: x360-Tools-Windows-Installer
          path: x360_tools_flutter/Output/x360_Tools_v2.0_Setup.exe
